name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # windows-latest : l'app WPF cible net8.0-windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build FoxholeLogiHub.sln -c Release

      - name: Tests (Core + API)
        run: dotnet test FoxholeLogiHub.sln -c Release --no-build --verbosity normal
