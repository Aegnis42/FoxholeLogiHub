name: release

# Publie une release installable (Velopack) quand un tag v* est poussé :
#   git tag v1.0.1 && git push origin v1.0.1
# → Setup .exe + paquets de mise à jour (delta) attachés à la GitHub Release.
# L'app installée vérifie ces releases au démarrage et propose le redémarrage.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      # Le nom du tag est passé par l'environnement (jamais interpolé dans un script shell,
      # ce qui éviterait une injection de commande via un nom de tag piégé).
      TAG_NAME: ${{ github.ref_name }}
      REPO_URL: https://github.com/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Valider le tag et en déduire la version
        shell: pwsh
        run: |
          if ($env:TAG_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Tag invalide : '$($env:TAG_NAME)'. Format attendu vMAJOR.MINOR.PATCH (ex. v1.0.1)."
            exit 1
          }
          "VERSION=$($env:TAG_NAME.Substring(1))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish (self-contained win-x64, ReadyToRun)
        shell: pwsh
        run: >
          dotnet publish src/FoxholeLogiHub.App/FoxholeLogiHub.App.csproj
          -c Release -r win-x64 --self-contained true
          -o publish "/p:Version=$env:VERSION" /p:PublishReadyToRun=true

      - name: Installer vpk (Velopack CLI)
        run: dotnet tool install -g vpk

      - name: Télécharger les releases précédentes (deltas)
        shell: pwsh
        continue-on-error: true # première release : rien à télécharger
        run: vpk download github --repoUrl $env:REPO_URL

      - name: Pack Velopack
        shell: pwsh
        run: >
          vpk pack --packId FoxholeLogiHub --packVersion $env:VERSION
          --packDir publish --mainExe FoxholeLogiHub.App.exe
          --packTitle "FoxholeLogiHub" --packAuthors "Aegnis42"
          --icon src/FoxholeLogiHub.App/Assets/icon.ico

      - name: Publier la GitHub Release
        shell: pwsh
        run: >
          vpk upload github --repoUrl $env:REPO_URL
          --publish --releaseName "FoxholeLogiHub v$env:VERSION"
          --tag $env:TAG_NAME --token $env:GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
